name: medicine_qr_app
description: A medicine QR scanner prototype

publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  mobile_scanner: ^5.2.3
  audioplayers: ^6.0.0
  qr_flutter: ^4.1.0
  path_provider: ^2.1.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/alarmz.mp3
    - assets/logo/logoo.png